<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project 4: Random Quote</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
      }

      .container {
        background: #fff;
        padding: 40px 50px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        text-align: center;
        max-width: 500px;
      }

      h1 {
        color: #333;
        margin-bottom: 20px;
      }

      #quoteDisplay {
        font-size: 22px;
        font-style: italic;
        color: #555;
        margin-bottom: 12px;
        min-height: 80px;
        line-height: 1.5;
      }

      #authorDisplay {
        font-size: 16px;
        color: #888;
        margin-bottom: 24px;
      }

      .btn-group {
        display: flex;
        gap: 12px;
        justify-content: center;
      }

      button {
        padding: 12px 24px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: transform 0.15s;
      }

      button:hover {
        transform: translateY(-2px);
      }

      #newQuoteBtn {
        background: #667eea;
        color: #fff;
      }

      #copyBtn {
        background: #2ecc71;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>💬 Random Quote</h1>
      <p id="quoteDisplay">Click "Quote mới" để bắt đầu</p>
      <p id="authorDisplay">—</p>
      <div class="btn-group">
        <button id="newQuoteBtn">Quote mới</button>
        <button id="copyBtn">Sao chép</button>
      </div>
    </div>
    <script>
      //1. Du Lieu
      const quotes = [
        {
          quote: "Cách tốt nhất để dự đoán tương lai là tạo ra nó.",
          author: "Peter Drucker",
        },
        {
          quote:
            "Đừng để ngày hôm qua chiếm quá nhiều thời gian của ngày hôm nay.",
          author: "Will Rogers",
        },
        { quote: "Thất bại là mẹ thành công.", author: "Tục ngữ Việt Nam" },
        { quote: "Học, học nữa, học mãi.", author: "Lênin" },
        {
          quote: "Có công mài sắt, có ngày nên kim.",
          author: "Tục ngữ Việt Nam",
        },
      ];
      ///2. Element can lay
      let ele_quote = document.getElementById("quoteDisplay");
      let ele_author = document.getElementById("authorDisplay");
      let ele_newBtn = document.getElementById("newQuoteBtn");
      let ele_copy = document.getElementById("copyBtn");
      // 3. Khi click "Quote moi"
      function showRandomQuote(arr) {
        if (arr.length === 0) return undefined;
        const randomIndex = Math.floor(Math.random() * arr.length);
        const object_index = arr[randomIndex];
        ele_quote.textContent = object_index.quote;
        ele_author.textContent = object_index.author;
      }
      showRandomQuote(quotes);
      ele_newBtn.addEventListener("click", function () {
        showRandomQuote(quotes);
      });
      ele_copy.addEventListener("click", function () {
        let quoteText = ele_quote.textContent;
        let authorText = ele_author.textContent;
        let fullText = quoteText + "" + authorText;
        navigator.clipboard.writeText(fullText);
        alert("Đã sao chép nội dung!");
      });
    </script>
  </body>
</html>
